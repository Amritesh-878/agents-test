# Scheduled Google Drive ingestion for Zoom .zip class exports.
#
# Runs the FULL pipeline (download -> transcribe -> embed -> pgvector) on a
# SELF-HOSTED runner on the RTX 3050 box, because WhisperX transcription is
# GPU-bound and GitHub-hosted runners are CPU-only. The GPU half is planned to
# move to AWS in a later stage; this workflow is the interim self-hosted runtime.
#
# Runner prerequisites (provision once, per README "Setup"):
#   - A self-hosted Actions runner registered on the GPU box (labels: self-hosted, windows).
#   - A project virtualenv at .venv with CUDA torch + WhisperX already installed
#     (the heavy GPU wheels are NOT reinstalled here -- only the pinned app deps).
#   - Local PostgreSQL 17 + pgvector reachable via DATABASE_URL (stays on localhost).
#   - ffmpeg on PATH.
#
# Required GitHub repository secrets:
#   GOOGLE_SERVICE_ACCOUNT_JSON  - full JSON key content (the Drive folder is shared
#                                  with this service account's email). Reuse the GCP
#                                  service-account JSON from the Zoom->Drive project.
#   GOOGLE_DRIVE_FOLDER_ID       - id of the Drive folder holding the Zoom .zip exports.
#   DATABASE_URL                 - postgresql://...@localhost:5432/adira
#   HF_TOKEN                     - HuggingFace token for WhisperX model downloads.
#   GROQ_API_KEY                 - only needed if a later step runs chat/eval.
# Required GitHub repository variable:
#   TEACHER_NAME                 - teacher's Zoom display name (e.g. "Nisha").

name: drive-sync

on:
  schedule:
    - cron: "0 2 * * *" # daily at 02:00 UTC; adjust to taste
  workflow_dispatch: {}

# Never let two ingests run at once -- they would contend for the single GPU.
concurrency:
  group: drive-sync
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: [self-hosted, windows]
    timeout-minutes: 240
    defaults:
      run:
        shell: powershell
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write service-account JSON to a temp file
        env:
          GCP_SA_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          $path = Join-Path $env:RUNNER_TEMP "gcp-sa.json"
          Set-Content -Path $path -Value $env:GCP_SA_JSON -Encoding utf8
          "GOOGLE_SERVICE_ACCOUNT_JSON=$path" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install pinned app dependencies
        run: |
          .\.venv\Scripts\Activate.ps1
          python -m pip install -r requirements.txt

      - name: Apply database migration (idempotent)
        run: |
          .\.venv\Scripts\Activate.ps1
          python -m scripts.migrate_db

      - name: Sync new Drive zips through the pipeline
        run: |
          .\.venv\Scripts\Activate.ps1
          python -m scripts.drive_sync --output-dir output --teacher "${{ vars.TEACHER_NAME }}"

      - name: Remove service-account JSON
        if: always()
        run: |
          if ($env:GOOGLE_SERVICE_ACCOUNT_JSON) {
            Remove-Item -Path $env:GOOGLE_SERVICE_ACCOUNT_JSON -Force -ErrorAction SilentlyContinue
          }
